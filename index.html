<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Dominik</title>
  <style>
    :root { --primary: #1a1a2e; --accent: #4f46e5; --bg: #f8fafc; }
    body { font-family: system-ui, sans-serif; margin: 0; padding: 0; background: var(--bg); color: #1a1a2e; }
    .header { background: var(--primary); padding: 16px 24px; color: white; }
    .header h1 { margin: 0; font-size: 1.5rem; }
    .nav { display: flex; gap: 8px; padding: 16px 24px; background: white; border-bottom: 1px solid #e2e8f0; }
    .nav button { padding: 10px 20px; border: none; background: transparent; cursor: pointer; font-size: 1rem; border-radius: 8px; }
    .nav button.active { background: var(--accent); color: white; }
    .content { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .tab { display: none; }
    .tab.active { display: block; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .stat h3 { margin: 0 0 8px 0; font-size: 0.8rem; color: #64748b; text-transform: uppercase; }
    .stat .value { font-size: 1.8rem; font-weight: 700; }
    .stat .positive { color: #22C55E; }
    .stat .negative { color: #EF4444; }
  </style>
</head>
<body>
  <header class="header">
    <h1>📊 Dashboard</h1>
  </header>
  <nav class="nav">
    <button class="active" onclick="showTab('finanzen')">💰 Finanzen</button>
    <button onclick="showTab('projekte')">🚀 Projekte</button>
    <button onclick="showTab('termine')">📅 Termine</button>
    <button onclick="showTab('todos')">✓ Todos</button>
  </nav>
  
  <main class="content">
    <div id="finanzen" class="tab active">
      <div class="stats">
        <div class="stat"><h3>Ausgaben</h3><div class="value">64.734€</div></div>
        <div class="stat"><h3>Einnahmen</h3><div class="value positive">65.501€</div></div>
        <div class="stat"><h3>Netto</h3><div class="value positive">+767€</div></div>
      </div>
    </div>
    
    <div id="projekte" class="tab">
      <div class="stat"><h3>🎬 Buschkamp Bros</h3><p>Event-Manager für Kampfsport-Gyms</p></div>
      <div class="stat"><h3>🚛 Nordic Trailer</h3><p>Mobile Sauna Vermietung</p></div>
    </div>
    
    <div id="termine" class="tab">
      <p>Termine werden geladen...</p>
    </div>
    
    <div id="todos" class="tab">
      <p>Todos werden geladen...</p>
    </div>
  </main>
  
  <script>
    function showTab(id) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      event.target.classList.add('active');
    }
  </script>
</body>
</html>
